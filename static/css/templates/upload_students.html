<!-- templates/upload_students.html -->
{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card animate__animated animate__fadeInUp">
            <div class="card-header">
                <h4 class="mb-0">Upload Student List</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>File Requirements:</strong>
                    <ul class="mb-0">
                        <li>CSV or Excel (.xlsx) file</li>
                        <li>Must contain columns: <code>student_number</code> and <code>student_name</code></li>
                        <li>Sample: student_number,student_name</li>
                        <li>12345,John Doe</li>
                    </ul>
                </div>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="subject_id" class="form-label">Select Subject</label>
                        <select class="form-select" id="subject_id" name="subject_id" required>
                            <option value="">Choose subject...</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">Upload File</label>
                        <input type="file" class="form-control" id="file" name="file" accept=".csv,.xlsx" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload & Process</button>
                    <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
