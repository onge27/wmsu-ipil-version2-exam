{% extends "base.html" %} {% block content %}
<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">📚 All Subjects</h4>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-light btn-sm">← Back to Dashboard</a>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Subject Name</th>
                        <th>Teacher</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for subject in subjects %}
                    <tr>
                        <td>{{ subject.id }}</td>
                        <td>{{ subject.subject_name }}</td>
                        <td>{{ subject.teacher_name }}</td>
                        <td>
                            <a href="{{ url_for('delete_subject', subject_id=subject.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('⚠️ Delete this subject? All exams, questions, and student enrollments will be permanently removed. This cannot be undone.')">
                                🗑️ Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-primary">🏠 Back to Admin Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
