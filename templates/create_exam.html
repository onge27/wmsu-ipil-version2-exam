{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}
{% block content %}
<div class="max-w-lg">
    <div class="mb-5">
        <a href="{{ url_for('teacher_dashboard') }}" class="text-sm text-gray-500 hover:text-maroon-700 transition-colors"><i class="fas fa-arrow-left mr-1.5"></i>Back to Dashboard</a>
    </div>
    <div class="mb-5">
        <h1 class="page-title">Create New Exam</h1>
        <p class="page-subtitle">Set up an exam for one of your subjects</p>
    </div>
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label" for="subject_id">Subject</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-book text-sm"></i></span>
                        <select id="subject_id" name="subject_id" class="form-input pl-9 cursor-pointer" required>
                            <option value="">Select a subject...</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="title">Exam Title</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-file-pen text-sm"></i></span>
                        <input type="text" id="title" name="title" class="form-input pl-9" placeholder="e.g. Midterm Examination" required>
                    </div>
                </div>
                <div class="mb-5">
                    <label class="form-label" for="duration">Duration (minutes)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-clock text-sm"></i></span>
                        <input type="number" id="duration" name="duration" class="form-input pl-9" placeholder="e.g. 60" min="1" max="300" required>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Enter the time limit in minutes (1–300).</p>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-arrow-right"></i> Create & Add Questions</button>
                    <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
