{% extends "base.html" %}

{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">{{ exam.title }}</h4>
            <div class="mt-2"><div class="timer" id="timer">Loading...</div></div>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('submit_exam', exam_id=exam.id) }}" id="examForm">
                {% for question in questions %}
                <div class="question-card">
                    <h6>Q{{ loop.index }}. {{ question.question }}</h6>
                    <div class="form-check"><input class="form-check-input" type="radio" name="q_{{ question.id }}" value="A" id="q{{ question.id }}_a"><label class="form-check-label" for="q{{ question.id }}_a">A. {{ question.option_a }}</label></div>
                    <div class="form-check"><input class="form-check-input" type="radio" name="q_{{ question.id }}" value="B" id="q{{ question.id }}_b"><label class="form-check-label" for="q{{ question.id }}_b">B. {{ question.option_b }}</label></div>
                    <div class="form-check"><input class="form-check-input" type="radio" name="q_{{ question.id }}" value="C" id="q{{ question.id }}_c"><label class="form-check-label" for="q{{ question.id }}_c">C. {{ question.option_c }}</label></div>
                    <div class="form-check"><input class="form-check-input" type="radio" name="q_{{ question.id }}" value="D" id="q{{ question.id }}_d"><label class="form-check-label" for="q{{ question.id }}_d">D. {{ question.option_d }}</label></div>
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary btn-lg">Submit Exam</button>
            </form>
        </div>
    </div>
</div>
<script>
function startTimer(durationMinutes, displayElement, formId) {
    let time = durationMinutes * 60;
    const timerDisplay = document.getElementById(displayElement);
    const interval = setInterval(() => {
        const minutes = Math.floor(time / 60);
        const seconds = time % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        if (time <= 0) {
            clearInterval(interval);
            document.getElementById(formId).submit();
        }
        time--;
    }, 1000);
}
startTimer({{ exam.duration }}, 'timer', 'examForm');
</script>
{% endblock %}
